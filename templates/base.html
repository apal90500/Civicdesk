<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicDesk</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen">


<header class="bg-blue-800 text-white px-4 py-3 shadow
               flex items-center justify-between md:hidden">
  <h1 class="text-base font-semibold">
    CivicDesk 
  </h1>

  <button id="menuBtn" class="text-2xl focus:outline-none">
    ☰
  </button>
</header>


<header class="bg-blue-800 text-white px-8 py-4 shadow hidden md:block">
  <h1 class="text-lg font-semibold">
    CivicDesk
    <span class="text-sm opacity-80">
      · Universal Complaint Management System
    </span>
  </h1>
</header>

<div class="flex">

  
  <aside id="sidebar"
    class="fixed md:static inset-y-0 left-0 w-72 bg-white shadow-lg p-6
           transform -translate-x-full md:translate-x-0
           transition-transform duration-200 z-40">

    <ul class="space-y-4 text-sm font-medium">
      <li><a href="/user/dashboard" class="block hover:text-blue-600">User Panel</a></li>
      <li><a href="/org-admin/dashboard" class="block hover:text-blue-600">Organization Admin</a></li>
      <li><a href="/department/dashboard" class="block hover:text-blue-600">Department Panel</a></li>
      <li><a href="/support/dashboard" class="block hover:text-blue-600">Support Panel</a></li>
      <li><a href="/super-admin/dashboard" class="block hover:text-blue-600">Super Admin</a></li>
      <li><a href="/complaints" class="block hover:text-blue-600">View Complaints</a></li>
      <li><a href="/analytics" class="block hover:text-blue-600">Analytics</a></li>
      <li><a href="/payments" class="block hover:text-blue-600">Payments</a></li>

      <li class="pt-4 border-t">
        <a href="/logout" class="block text-red-600 hover:text-red-800">
          Logout
        </a>
      </li>
    </ul>
  </aside>

  
  <div id="overlay"
       class="fixed inset-0 bg-black/40 hidden z-30 md:hidden"></div>

  
  <main class="flex-1 p-4 sm:p-6 md:p-10">
    {% block content %}{% endblock %}
  </main>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn?.addEventListener("click", () => {
  sidebar.classList.toggle("-translate-x-full");
  overlay.classList.toggle("hidden");
});

overlay?.addEventListener("click", () => {
  sidebar.classList.add("-translate-x-full");
  overlay.classList.add("hidden");
});
</script>

</body>
</html>
