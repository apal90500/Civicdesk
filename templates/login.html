<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicDesk | Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-700 to-indigo-800
             flex items-center justify-center px-4">

<div class="bg-white/95 backdrop-blur p-6 sm:p-8
            rounded-2xl shadow-2xl w-full max-w-md
            animate-fade-in">

  <h2 class="text-2xl sm:text-3xl font-semibold mb-2 text-center">
    Welcome Back 👋
  </h2>

  <p class="text-sm text-gray-500 mb-6 text-center">
    Login to CivicDesk
  </p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="mb-4 p-3 rounded-lg text-sm
        {% if category == 'error' %}
          bg-red-100 text-red-700
        {% else %}
          bg-green-100 text-green-700
        {% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form action="/login" method="post" class="space-y-4">

    <input name="email" type="email"
           class="w-full border rounded-lg p-3 text-sm
                  focus:outline-none focus:ring-2 focus:ring-blue-500"
           placeholder="Email address"
           required />

    <div class="relative">
      <input id="password" name="password" type="password"
             class="w-full border rounded-lg p-3 pr-10 text-sm
                    focus:outline-none focus:ring-2 focus:ring-blue-500"
             placeholder="Password"
             required />

      <button type="button"
              onclick="togglePassword()"
              class="absolute right-3 top-3 text-gray-500 text-sm">
        👁
      </button>
    </div>

    <button type="submit"
            class="w-full py-3 rounded-lg text-white font-semibold
                   bg-gradient-to-r from-blue-600 to-indigo-600
                   hover:opacity-90 transition active:scale-[0.98]">
      Login
    </button>

  </form>

  <p class="text-center text-sm text-gray-600 mt-5">
    Don’t have an account?
    <a href="/register"
       class="text-blue-700 font-medium hover:underline">
      Create one
    </a>
  </p>

</div>

<script>
  function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
  }
</script>

</body>
</html>
